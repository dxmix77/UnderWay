name: Count Visits

on:
  repository_dispatch:
    types: [increment_visit]

jobs:
  update-counter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Read visits.json
        id: readjson
        run: |
          count=$(jq '.visits' visits.json)
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Increment counter
        run: |
          newcount=$(( ${{ steps.readjson.outputs.count }} + 1 ))
          echo "{ \"visits\": $newcount }" > visits.json

      - name: Commit changes
        run: |
          timestamp=$(date +"%Y-%m-%d %H:%M")
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add visits.json
          git commit -m "Visit recorded at $timestamp"
          git push
