   <style>

<body>
   <h1>Interactive Map of the Strait of Hormuz</h1>
   <p class="subtitle">Click the dots and draw your conclusions</p>

   <div id="menu-icon" aria-hidden="true">≡</div>

   <div id="image-container">
     <img id="bg-image" src="gulf.png" alt="Map of the Strait of Hormuz
with vessel tracking points">
   </div>

   <script>
     const ORIGINAL_WIDTH = 1238;
     const ORIGINAL_HEIGHT = 717;
     const HOTSPOT_SIZE_PX = 17;

     function getHotspotSizePx() {
       const renderedWidth =
document.getElementById("bg-image").clientWidth || ORIGINAL_WIDTH;
       return (HOTSPOT_SIZE_PX / ORIGINAL_WIDTH) * renderedWidth;
     }

function createHotspot(url, x, y, id) {
  const container = document.getElementById("image-container");
  const hotspot = document.createElement("div");
  hotspot.className = "hotspot";
  hotspot.dataset.hotspotId = id;

  const leftPercent = (x / ORIGINAL_WIDTH) * 100;
  const topPercent = (y / ORIGINAL_HEIGHT) * 100;
  const sizePx = getHotspotSizePx();

  hotspot.style.left = leftPercent + "%";
  hotspot.style.top = topPercent + "%";
  hotspot.style.width = sizePx + "px";
  hotspot.style.height = sizePx + "px";

  hotspot.addEventListener("click", () => {
    incrementHotspotCounter(id);
    window.location.href = url;
  });

  container.appendChild(hotspot);
}
      function incrementHotspotCounter(id) {
  fetch("https://api.github.com/repos/dxmix77/UnderWay/actions/workflows/increment-hotspot.yml/dispatches", {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      ref: "main",
      inputs: { hotspot_id: id }
    })
  }).catch(error => {
    console.error("Hotspot counter increment failed:", error);
  });
}

     function loadHotspots() {
       fetch("pixel_coordinates.txt")
         .then(response => {
           if (!response.ok) {
             throw new Error("Could not load pixel_coordinates.txt");
           }
           return response.text();
         })
         .then(text => {
           const lines = text.trim().split("\n");
           const entries = lines.slice(1);

           entries.forEach(line => {
             const [url, xStr, yStr] = line.split(/\t+/);
             const x = parseFloat(xStr);
             const y = parseFloat(yStr);

             if (!url || Number.isNaN(x) || Number.isNaN(y)) {
               return;
             }

             createHotspot(url, x, y);
           });
         })
         .catch(error => {
           console.error("Error loading hotspots:", error);
         });
     }

     function resizeHotspots() {
       const hotspots = document.querySelectorAll(".hotspot");
       const sizePx = getHotspotSizePx();

       hotspots.forEach(hotspot => {
         hotspot.style.width = sizePx + "px";
         hotspot.style.height = sizePx + "px";
       });
     }

     window.addEventListener("load", loadHotspots);
     window.addEventListener("resize", resizeHotspots);
   </script>

   <script>
(function () {
  fetch("https://api.github.com/repos/dxmix77/UnderWay/actions/workflows/increment-counter.yml/dispatches", {

      "Content-Type": "application/json"
    },
    body: JSON.stringify({

    })
  }).catch(error => {
    console.error("Counter increment failed:", error);
  });
})();
</script>
